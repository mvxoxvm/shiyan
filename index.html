<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mvxoxvm | Test Homepage</title>
  <meta name="description" content="一个用于测试 GitHub Pages 的简洁个人主页。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="hero-title">
      <p class="eyebrow">GitHub Pages Test</p>
      <h1 id="hero-title">Hi, I'm mvxoxvm.</h1>
      <p class="lede">这是一个简洁的测试主页，用来确认静态网站可以成功写入仓库并发布到 GitHub Pages。</p>
      <div class="actions" aria-label="主要操作">
        <a class="button primary" href="#projects">查看内容</a>
        <a class="button" href="https://github.com/mvxoxvm" rel="noopener">GitHub 主页</a>
      </div>
    </section>

    <section class="card" aria-labelledby="about-title">
      <p class="section-label">About</p>
      <h2 id="about-title">一个轻量的静态页面实验。</h2>
      <p>这里没有填写私人邮箱，只保留公开的 GitHub 主页入口。后续可以把这里换成真实介绍、作品列表或学习笔记。</p>
    </section>

    <section class="grid" id="projects" aria-labelledby="projects-title">
      <div class="section-heading">
        <p class="section-label">Demo</p>
        <h2 id="projects-title">测试内容</h2>
      </div>
      <article class="project-card">
        <span>01</span>
        <h3>静态 HTML</h3>
        <p>页面不依赖构建工具，适合直接部署。</p>
      </article>
      <article class="project-card">
        <span>02</span>
        <h3>响应式样式</h3>
        <p>桌面和手机屏幕都会自动调整布局。</p>
      </article>
      <article class="project-card">
        <span>03</span>
        <h3>Pages 发布</h3>
        <p>用于测试 GitHub Pages 是否能正常生成访问链接。</p>
      </article>
    </section>
  </main>
</body>
</html>
